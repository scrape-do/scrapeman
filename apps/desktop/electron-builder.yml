appId: com.scrapeman.app
productName: Scrapeman
copyright: Copyright © 2026 scrape-do

# Force the artifact filename to use productName, not package.json name.
# Without this, deb packaging falls back to "@scrapeman/desktop" and tries
# to write to release/@scrapeman/... — fpm bails because the parent dir
# does not exist.
artifactName: ${productName}-${version}-${arch}.${ext}

directories:
  output: release
  buildResources: build-resources

files:
  - out/**/*
  - package.json

asar: true

# pnpm workspace packages (http-core, shared-types) need to be hoisted /
# followed because they live as symlinks. electron-builder v24+ handles
# this when npmRebuild is off and files contains the actual dist paths.
npmRebuild: false
nodeGypRebuild: false
buildDependenciesFromSource: false

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  darkModeSupport: true
  # electron-builder cannot do ad-hoc signing on its own (passing `-`
  # as identity makes it search the keychain for a real cert named
  # "-" and fail). We skip electron-builder's signing and run
  # `codesign --force --deep --sign -` from the afterPack hook below.
  # Apple Silicon Big Sur+ requires this or the app launches with the
  # misleading "damaged" error.
  identity: null
  gatekeeperAssess: false

afterPack: ./build-resources/after-pack.cjs

dmg:
  writeUpdateInfo: false
  sign: false

win:
  target:
    - target: nsis
      arch:
        - x64
  # Unsigned — SmartScreen will warn on first run.
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

linux:
  executableName: scrapeman
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  synopsis: Postman-grade API client for every developer
  description: |
    Scrapeman is an API client for every developer who wants Postman's
    paid features for free — local-first, git-friendly collections,
    built-in load testing, unlimited history, and first-class proxy
    support. Alternative to Postman, Bruno, and Insomnia.

publish: null
