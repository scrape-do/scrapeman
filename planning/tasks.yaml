  # ================= M12: Competitive gaps from Hoppscotch / Yaak research =================

  - id: T1200
    title: Request chaining via response variable capture
    milestone: M12
    owner: developer-core
    estimate_hours: 12
    depends_on: [T030, T034]
    tags: [core, competitive-gap, from-research]
    acceptance:
      - Both Hoppscotch and Yaak let users pull a value from one response and use it in a later request; scope.md lists this as v1.5 but no task has been filed yet
      - Unlocks multi-step flows (login → token → authenticated call) without a script sandbox
      - Per-request "Capture" tab defines named captures (JSONPath, regex, or header name) persisted in .req.yaml
      - Captured values stored in a runtime scope accessible as {{capture.name}} in any later request in the tab session or collection run
      - Scope precedence: capture beats env, loses to explicit local override
      - "Acceptance: send request A that captures $.token, then send request B with Authorization: Bearer {{capture.token}} and assert the header is resolved correctly in an integration test"

